services:
  db:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_DB: skillio_db
      POSTGRES_USER: skillio_user
      POSTGRES_PASSWORD: skillio_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U skillio_user -d skillio_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: always
    ports:
      - "6379:6379"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: always
    environment:
      - DEBUG=1
      - DATABASE_URL=postgresql://skillio_user:skillio_password@db:5432/skillio_db
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=django-insecure-change-this-in-production
      - CORS_ALLOWED_ORIGINS=http://localhost:3000,http://127.0.0.1:3000,http://0.0.0.0:3000,http://192.168.0.89:3000
      - GOOGLE_API_KEY=AIzaSyBQquDkHNvJnHKgRKPrbfcqWITVVfEH9Yg
    volumes:
      - ./backend:/app
      - ./backend/media:/app/media
    ports:
      - "0.0.0.0:8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    command: >
      sh -c "
        python manage.py migrate &&
        python manage.py collectstatic --noinput &&
        python manage.py runserver 0.0.0.0:8000
      "

  frontend:
    build:
      context: ./Frontend
      dockerfile: Dockerfile
    restart: always
    environment:
      - VITE_API_BASE_URL=http://192.168.0.89:8000
      - VITE_GOOGLE_GENERATIVE_LANGUAGE_API_KEY=AIzaSyBQquDkHNvJnHKgRKPrbfcqWITVVfEH9Yg
      - VITE_EMAILJS_SERVICE_ID=service_d427cse
      - VITE_EMAILJS_TEMPLATE_ID=template_sen9xx4
      - VITE_EMAILJS_USER_ID=sNWIk3c3ZX9fB_hHq
      - VITE_SUPABASE_URL=https://cpqecntjnimngamjzznr.supabase.co
      - VITE_SUPABASE_ANON_KEY=eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNwcWVjbnRqbmltbmdhbWp6em5yIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTk5OTcwMTEsImV4cCI6MjA3NTU3MzAxMX0._ySrpA-EHt-EG44ceHSVSK8Pw97WbMhbOVIu4jrNhY4
      - VITE_YOUTUBE_API_KEY=AIzaSyCe8NF26zl2vwSQBKoPrEfFT2RRHaIOlG4
    ports:
      - "0.0.0.0:3000:3000"
    depends_on:
      - backend
    volumes:
      - ./Frontend:/app
      - /app/node_modules

volumes:
  postgres_data:
