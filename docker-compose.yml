services:
  # PostgreSQL Database
  db:
    image: postgres:15-alpine
    container_name: skillio_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-skillio_db}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backup:/backup
    ports:
      - "5432:5432"
    networks:
      - skillio_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-skillio_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Django Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: skillio_backend
    restart: unless-stopped
    environment:
      - DEBUG=${DEBUG:-1}
      - DB_NAME=${DB_NAME:-skillio_db}
      - DB_USER=${DB_USER:-postgres}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_HOST=db
      - DB_PORT=5432
      - SECRET_KEY=${SECRET_KEY}
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS:-http://localhost:5173,http://127.0.0.1:5173,http://localhost:80}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
      - ALLOWED_HOSTS=${ALLOWED_HOSTS:-*}
    volumes:
      - ./backend:/app
      - backend_media:/app/media
      - backend_static:/app/staticfiles
      - backend_logs:/app/logs
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - skillio_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    command: >
      sh -c "
        echo '🔄 Aguardando banco de dados...' &&
        sleep 5 &&
        echo '📊 Executando migrations...' &&
        python manage.py migrate --noinput &&
        echo '📦 Coletando arquivos estáticos...' &&
        python manage.py collectstatic --noinput &&
        echo '🚀 Iniciando servidor Django...' &&
        python manage.py runserver 0.0.0.0:8000
      "

  # React Frontend
  frontend:
    build:
      context: ./Frontend
      dockerfile: Dockerfile
    container_name: skillio_frontend
    restart: unless-stopped
    environment:
      - VITE_API_URL=${VITE_API_URL:-http://localhost:8000}
      - VITE_GOOGLE_GENERATIVE_LANGUAGE_API_KEY=${VITE_GOOGLE_GENERATIVE_LANGUAGE_API_KEY}
      - VITE_EMAILJS_SERVICE_ID=${VITE_EMAILJS_SERVICE_ID}
      - VITE_EMAILJS_TEMPLATE_ID=${VITE_EMAILJS_TEMPLATE_ID}
      - VITE_EMAILJS_USER_ID=${VITE_EMAILJS_USER_ID}
      - VITE_SUPABASE_URL=${VITE_SUPABASE_URL}
      - VITE_SUPABASE_ANON_KEY=${VITE_SUPABASE_ANON_KEY}
      - VITE_YOUTUBE_API_KEY=${VITE_YOUTUBE_API_KEY}
    ports:
      - "5173:5173"
    depends_on:
      - backend
    volumes:
      - ./Frontend:/app
      - frontend_node_modules:/app/node_modules
      - frontend_dist:/app/dist
    networks:
      - skillio_network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:5173"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: skillio_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - backend_static:/static:ro
      - backend_media:/media:ro
      - nginx_logs:/var/log/nginx
    depends_on:
      - backend
      - frontend
    networks:
      - skillio_network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Redis (opcional - para cache e sessões)
  redis:
    image: redis:7-alpine
    container_name: skillio_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - skillio_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    command: redis-server --appendonly yes

# Volumes nomeados para persistência de dados
volumes:
  postgres_data:
    name: skillio_postgres_data
    driver: local
  backend_media:
    name: skillio_backend_media
    driver: local
  backend_static:
    name: skillio_backend_static
    driver: local
  backend_logs:
    name: skillio_backend_logs
    driver: local
  frontend_node_modules:
    name: skillio_frontend_node_modules
    driver: local
  frontend_dist:
    name: skillio_frontend_dist
    driver: local
  redis_data:
    name: skillio_redis_data
    driver: local
  nginx_logs:
    name: skillio_nginx_logs
    driver: local

# Network para comunicação entre containers
networks:
  skillio_network:
    name: skillio_network
    driver: bridge
